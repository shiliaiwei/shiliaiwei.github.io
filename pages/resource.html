<title>Resources</title>
<style>
  .resource-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin: 2rem 0 1rem 0;
  }
  .resource-controls input, .resource-controls select {
    font-size: 1rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1.5px solid #bbb;
    min-width: 180px;
    outline: none;
    transition: border 0.18s;
  }
  .resource-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.18em;
    margin-bottom: 0.1rem;
    margin-top: 1.5rem;
    justify-content: flex-start;
  }
  .resource-category {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-dark);
    background: none;
    border-radius: 4px;
    padding: 0.05em 0.45em 0.05em 0.45em;
    letter-spacing: 0.01em;
    text-transform: lowercase;
    opacity: 0.92;
    border: none;
    display: inline-block;
  }
  .resource-card h3 {
    color: var(--polynesian-blue);
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 0 0.2em 0;
    letter-spacing: 0.01em;
  }
  .resource-card p {
    color: var(--text-dark);
    font-size: 1.01rem;
    margin: 0.5em 0 0 0;
    font-weight: 400;
  }
  #resourceGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    justify-content: center;
    align-items: stretch;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }
  .resource-card {
    box-sizing: border-box;
    border-radius: 12px;
    border: 1.5px solid #e0e0e0;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 1.1rem 1.2rem 1.2rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    min-height: 200px;
    transition: box-shadow 0.18s, border 0.18s;
  }
  .resource-card:hover {
    box-shadow: 0 6px 24px rgba(255,0,80,0.10);
    border: 1.5px solid #ff0050;
  }
  .resource-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    z-index: 2;
  }
  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: auto;
    padding-top: 0.8rem;
  }
  .resource-link {
    display: inline-block;
    font-weight: 600;
    color: var(--polynesian-blue);
    background: none;
    border: none;
    border-radius: 6px;
    padding: 0.13em 0.8em;
    text-decoration: underline;
    font-size: 0.89rem;
    box-shadow: none;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .resource-link:hover, .resource-link:focus {
    text-decoration: underline;
    color: var(--polynesian-blue);
  }
  @media (max-width: 900px) {
    #resourceGrid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
    }
  }
  @media (max-width: 600px) {
    #resourceGrid {
      grid-template-columns: 1fr;
      gap: 0.7rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
      padding: 0.9rem 0.7rem 1rem 0.7rem;
    }
    .resource-controls {
      flex-direction: column;
      gap: 0.7rem;
      margin: 1rem 0;
    }
  }
</style>

<h1 class="resource-title">Resource Directory</h1>
<div class="resource-controls">
  <input id="resourceSearch" type="text" placeholder="Search resources..." />
  <label for="resourceSort" class="resource-label">Category:</label>
  <select id="resourceSort" title="Select resource category">
    <option value="">All Categories</option>
    <option value="Education">Education</option>
    <option value="Blockchain">Blockchain</option>
    <option value="Tools">Tools</option>
    <option value="Transparency">Transparency</option>
    <option value="Development">Development</option>
    <option value="Environment">Environment</option>
    <option value="Research">Research</option>
    <option value="OSINT">OSINT</option>
    <option value="Privacy">Privacy</option>
    <option value="Maps">Maps</option>
    <option value="Radio">Radio</option>
    <option value="Art">Art</option>
    <option value="Design">Design</option>
    <option value="Security">Security</option>
    <option value="Media">Media</option>
  </select>
</div>
<div id="resourceGrid"></div>
<script src="/scripts/resource-cards.js"></script>
