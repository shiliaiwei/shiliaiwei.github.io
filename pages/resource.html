<title>Resources</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .resource-controls {
    display: flex;
    justify-content: center;
    margin: 2rem 0 1.5rem 0;
  }
  .filter-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
  }
  .category-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
  }
  .category-btn {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 2px solid var(--border-color);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    white-space: nowrap;
  }
  .category-btn:hover {
    background: rgba(88,166,255,0.1);
    border-color: var(--accent-color);
    color: white;
    transform: translateY(-1px);
  }
  .category-btn.active {
    background: var(--accent-color);
    color: white;
    border-color: var(--accent-color);
    box-shadow: 0 2px 8px rgba(88,166,255,0.3);
  }
  .category-btn.selected {
    background: rgba(88,166,255,0.8);
    color: white;
    border-color: var(--accent-color);
  }
  .filter-hint {
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }
  
  /* Match indicators */
  .match-indicator {
    font-size: 0.8rem;
    font-weight: bold;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    text-align: center;
  }
  .full-match {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
    border: 1px solid #22c55e;
  }
  .partial-match {
    background: rgba(251, 191, 36, 0.2);
    color: #fbbf24;
    border: 1px solid #fbbf24;
  }
  .resource-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.18em;
    margin-bottom: 0.1rem;
    margin-top: 1.5rem;
    justify-content: flex-start;
  }
  .resource-category {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border-radius: 4px;
    padding: 0.05em 0.45em 0.05em 0.45em;
    letter-spacing: 0.01em;
    text-transform: lowercase;
    opacity: 0.92;
    border: none;
    display: inline-block;
  }
  .resource-card h3 {
    color: var(--text-white);
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 0 0.2em 0;
    letter-spacing: 0.01em;
  }
  .resource-card p {
    color: var(--text-white);
    font-size: 1.01rem;
    margin: 0.5em 0 0 0;
    font-weight: 400;
    opacity: 0.9;
  }
  #resourceGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    justify-content: center;
    align-items: stretch;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }
  .resource-card {
    box-sizing: border-box;
    border-radius: 12px;
    border: 1.5px solid var(--border-color);
    background: var(--bg-secondary);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    padding: 1.1rem 1.2rem 1.2rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    min-height: 200px;
    transition: box-shadow 0.18s, border 0.18s;
  }
  .resource-card:hover {
    box-shadow: 0 6px 24px rgba(88,166,255,0.15);
    border: 1.5px solid var(--accent-color);
  }
  .resource-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: auto;
    padding-top: 0.8rem;
  }
  .resource-link {
    display: inline-block;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border: 1px solid var(--accent-color);
    border-radius: 6px;
    padding: 0.4em 1em;
    text-decoration: none;
    font-size: 0.89rem;
    box-shadow: none;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .resource-link:hover, .resource-link:focus {
    text-decoration: none;
    color: var(--accent-color);
    border: 1px solid var(--accent-color);
  }
  @media (max-width: 900px) {
    #resourceGrid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
    }
    .search-container {
      max-width: 400px;
    }
  }
  @media (max-width: 600px) {
    #resourceGrid {
      grid-template-columns: 1fr;
      gap: 0.7rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
      padding: 0.9rem 0.7rem 1rem 0.7rem;
    }
    .resource-controls {
      margin: 1rem 0;
      padding: 0 1rem;
    }
    .filter-container {
      max-width: 100%;
    }
    .category-buttons {
      gap: 0.3rem;
    }
    .category-btn {
      font-size: 0.8rem;
      padding: 0.4rem 0.7rem;
    }
  }
</style>

<h1 class="resource-title">Resource Directory</h1>
<div class="resource-controls">
  <div class="filter-container">
    <div class="category-buttons">
      <button class="category-btn active" data-category="">All</button>

      <button class="category-btn" data-category="Education">Education</button>
      <button class="category-btn" data-category="Productivity">Productivity</button>
      <button class="category-btn" data-category="Privacy">Privacy</button>
      <button class="category-btn" data-category="Blockchain">Blockchain</button>
      <button class="category-btn" data-category="Testing">Testing</button>
      <button class="category-btn" data-category="Visualization">Visualization</button>
      <button class="category-btn" data-category="Gaming">Gaming</button>
      <button class="category-btn" data-category="Social">Social</button>
      <button class="category-btn" data-category="Finance">Finance</button>
      <button class="category-btn" data-category="Tools">Tools</button>
    </div>


  </div>
</div>
<div id="resourceGrid"></div>
