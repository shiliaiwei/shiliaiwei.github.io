<title>Resources</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .resource-controls {
    display: flex;
    justify-content: center;
    margin: 2rem 0 1.5rem 0;
  }
  .filter-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
  }
  .category-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
  }
  .category-btn {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 2px solid var(--border-color);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    white-space: nowrap;
  }
  .category-btn:hover {
    background: rgba(88,166,255,0.1);
    border-color: var(--accent-color);
    color: white;
    transform: translateY(-1px);
  }
  .category-btn.active {
    background: var(--accent-color);
    color: white;
    border-color: var(--accent-color);
    box-shadow: 0 2px 8px rgba(88,166,255,0.3);
  }
  .category-btn.selected {
    background: rgba(88,166,255,0.8);
    color: white;
    border-color: var(--accent-color);
  }
  .filter-hint {
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }
  
  /* Match indicators */
  .match-indicator {
    font-size: 0.8rem;
    font-weight: bold;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    text-align: center;
  }
  .full-match {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
    border: 1px solid #22c55e;
  }
  .partial-match {
    background: rgba(251, 191, 36, 0.2);
    color: #fbbf24;
    border: 1px solid #fbbf24;
  }
  .resource-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.18em;
    margin-bottom: 0.1rem;
    margin-top: 1.5rem;
    justify-content: flex-start;
  }
  .resource-category {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border-radius: 4px;
    padding: 0.05em 0.45em 0.05em 0.45em;
    letter-spacing: 0.01em;
    text-transform: lowercase;
    opacity: 0.92;
    border: none;
    display: inline-block;
  }
  .resource-card h3 {
    color: var(--text-white);
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 0 0.2em 0;
    letter-spacing: 0.01em;
  }
  .resource-card p {
    color: var(--text-white);
    font-size: 1.01rem;
    margin: 0.5em 0 0 0;
    font-weight: 400;
    opacity: 0.9;
  }
  #resourceGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    justify-content: center;
    align-items: stretch;
    margin: 2rem auto;
    width: 100%;
    max-width: 1400px;
    padding: 0 1rem;
  }
  .resource-card {
    box-sizing: border-box;
    border-radius: 12px;
    border: 1.5px solid var(--border-color);
    background: var(--bg-secondary);
    padding: 1.5rem;
    transition: box-shadow 0.18s, border 0.18s, transform 0.18s;
    height: auto;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--bg-secondary);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    padding: 1.1rem 1.2rem 1.2rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    min-height: 200px;
    transition: box-shadow 0.18s, border 0.18s;
  }
  .resource-card:hover {
    box-shadow: 0 6px 24px rgba(88,166,255,0.15);
    border: 1.5px solid var(--accent-color);
  }
  .resource-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: auto;
    padding-top: 0.8rem;
  }
  .resource-link {
    display: inline-block;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border: 1px solid var(--accent-color);
    border-radius: 6px;
    padding: 0.4em 1em;
    text-decoration: none;
    font-size: 0.89rem;
    box-shadow: none;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .resource-link:hover, .resource-link:focus {
    text-decoration: none;
    color: var(--accent-color);
    border: 1px solid var(--accent-color);
  }
  @media (max-width: 900px) {
    #resourceGrid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      padding: 0 0.5rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
      min-height: 260px;
    }
    .filter-container {
      max-width: 400px;
    }
  }
  @media (max-width: 600px) {
    #resourceGrid {
      grid-template-columns: 1fr;
      gap: 1rem;
      padding: 0 0.5rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
      padding: 1.25rem;
      min-height: 240px;
    }
    .resource-controls {
      margin: 1rem 0;
      padding: 0 1rem;
    }
    .filter-container {
      max-width: 100%;
    }
    .category-buttons {
      gap: 0.3rem;
    }
    .category-btn {
      font-size: 0.8rem;
      padding: 0.4rem 0.7rem;
    }
  }
</style>

<h1 class="resource-title">Resource Directory</h1>
<div class="resource-controls">
  <div class="filter-container">
    <div class="category-buttons">
      <button class="category-btn active" data-category="">All</button>
      <button class="category-btn" data-category="Development">Development</button>
      <button class="category-btn" data-category="Design">Design</button>
      <button class="category-btn" data-category="AI">AI</button>
      <button class="category-btn" data-category="Security">Security</button>
      <button class="category-btn" data-category="Education">Education</button>
      <button class="category-btn" data-category="Productivity">Productivity</button>
      <button class="category-btn" data-category="Privacy">Privacy</button>
      <button class="category-btn" data-category="Blockchain">Blockchain</button>
      <button class="category-btn" data-category="Testing">Testing</button>
      <button class="category-btn" data-category="Visualization">Visualization</button>
      <button class="category-btn" data-category="Gaming">Gaming</button>
      <button class="category-btn" data-category="Social">Social</button>
      <button class="category-btn" data-category="Finance">Finance</button>
      <button class="category-btn" data-category="Tools">Tools</button>
    </div>


  </div>
</div>
<div id="resourceGrid"></div>

<script>
// Immediate diagnostic check
console.log('=== DIAGNOSTIC START ===');
console.log('Page loaded at:', new Date().toLocaleTimeString());

// Simple working filter system
let currentSelectedCategory = '';

// Simple shuffle function
function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function filterAndSort(selectedCategory) {
  console.log('=== FILTER AND SORT ===');
  console.log('Selected category:', selectedCategory);
  
  const grid = document.getElementById('resourceGrid');
  if (!grid) {
    console.log('❌ Grid not found!');
    return;
  }
  
  // Update current selection
  currentSelectedCategory = selectedCategory;
  
  // Update button states
  document.querySelectorAll('.category-btn').forEach(btn => {
    const btnCategory = btn.getAttribute('data-category');
    btn.classList.remove('active', 'selected');
    
    if (btnCategory === selectedCategory) {
      if (selectedCategory === '') {
        btn.classList.add('active');
      } else {
        btn.classList.add('selected');
      }
    }
  });
  
  // Check if resources are available
  if (typeof resources === 'undefined' || !resources.length) {
    console.log('⚠️ Resources not available, showing test cards');
    showTestCards(selectedCategory);
    return;
  }
  
  console.log('✅ Found', resources.length, 'total resources');
  
  let matchingResources = [];
  let otherResources = [];
  
  // Separate matching and non-matching resources
  resources.forEach(resource => {
    const resourceCategories = resource.categories || [];
    
    if (selectedCategory === '' || resourceCategories.includes(selectedCategory)) {
      matchingResources.push(resource);
    } else {
      otherResources.push(resource);
    }
  });
  
  console.log('Matching resources:', matchingResources.length);
  console.log('Other resources:', otherResources.length);
  
  // Combine with matching resources on top
  const sortedResources = [
    ...shuffleArray(matchingResources),
    ...shuffleArray(otherResources)
  ];
  
  // Render all cards
  grid.innerHTML = '';
  
  sortedResources.forEach((res, i) => {
    const colorClass = ['coCard1', 'coCard2', 'coCard3'][i % 3];
    const card = document.createElement('div');
    card.className = `card resource-card ${colorClass}`;
    
    // Add match indicator for top results
    let matchIndicator = '';
    if (selectedCategory !== '' && i < matchingResources.length) {
      matchIndicator = '<div class="match-indicator full-match">★ Top Match</div>';
    }
    
    card.innerHTML = `
      ${matchIndicator}
      <h3>${res.title}</h3>
      <p>${res.description}</p>
      <div class="resource-categories">
        ${(res.categories || []).slice(0,2).map(cat => `<span class="resource-category">${cat}</span>`).join('')}
      </div>
      <div class="button-container">
        <a href="${res.url}" target="_blank" rel="noopener" class="resource-link">Source</a>
      </div>
    `;
    grid.appendChild(card);
  });
  
  console.log('✅ Rendered', sortedResources.length, 'cards with', matchingResources.length, 'top matches');
}

function showTestCards(selectedCategory) {
  const grid = document.getElementById('resourceGrid');
  
  // Test cards for each category
  const allTestCards = [
    { title: "ChatGPT", description: "AI-powered conversational assistant", categories: ["AI"] },
    { title: "Midjourney", description: "AI image generation tool", categories: ["AI", "Design"] },
    { title: "Figma", description: "Collaborative design platform", categories: ["Design"] },
    { title: "Adobe XD", description: "UI/UX design tool", categories: ["Design"] },
    { title: "VS Code", description: "Code editor for developers", categories: ["Development"] },
    { title: "GitHub", description: "Code repository platform", categories: ["Development"] },
    { title: "Notion", description: "All-in-one productivity workspace", categories: ["Productivity"] },
    { title: "Slack", description: "Team communication platform", categories: ["Productivity", "Social"] }
  ];
  
  let matchingCards = [];
  let otherCards = [];
  
  allTestCards.forEach(card => {
    if (selectedCategory === '' || card.categories.includes(selectedCategory)) {
      matchingCards.push(card);
    } else {
      otherCards.push(card);
    }
  });
  
  const sortedCards = [...matchingCards, ...otherCards];
  
  grid.innerHTML = '';
  
  sortedCards.forEach((card, i) => {
    const cardElement = document.createElement('div');
    cardElement.className = 'card resource-card coCard1';
    
    let matchIndicator = '';
    if (selectedCategory !== '' && i < matchingCards.length) {
      matchIndicator = '<div class="match-indicator full-match">★ Top Match</div>';
    }
    
    cardElement.innerHTML = `
      ${matchIndicator}
      <h3>${card.title}</h3>
      <p>${card.description}</p>
      <div class="resource-categories">
        ${card.categories.slice(0,2).map(cat => `<span class="resource-category">${cat}</span>`).join('')}
      </div>
      <div class="button-container">
        <a href="#" class="resource-link">Demo Link</a>
      </div>
    `;
    grid.appendChild(cardElement);
  });
  
  console.log('✅ Test cards created with', matchingCards.length, 'top matches for:', selectedCategory);
}

// Force show some cards as backup
function forceShowCards() {
  console.log('=== FORCE SHOW CARDS ===');
  const grid = document.getElementById('resourceGrid');
  
  if (!grid) {
    console.log('❌ Grid not found!');
    return;
  }
  
  console.log('✅ Grid found, creating test cards...');
  
  // Create test cards to ensure grid works
  const testCards = [
    { title: "Test AI Card", description: "This is a test AI card to verify filtering works", url: "#", categories: ["AI"] },
    { title: "Test Design Card", description: "This is a test Design card with longer description to test height consistency", url: "#", categories: ["Design"] },
    { title: "Test Development Card", description: "Third test card for development", url: "#", categories: ["Development"] }
  ];
  
  grid.innerHTML = '';
  
  testCards.forEach((card, i) => {
    const cardElement = document.createElement('div');
    cardElement.className = 'card resource-card coCard1';
    cardElement.innerHTML = `
      <div class="match-indicator full-match">🔧 Test Card</div>
      <h3>${card.title}</h3>
      <p>${card.description}</p>
      <div class="resource-categories">
        <span class="resource-category">${card.categories[0]}</span>
      </div>
      <div class="button-container">
        <a href="${card.url}" class="resource-link">Test Link</a>
      </div>
    `;
    grid.appendChild(cardElement);
  });
  
  console.log('✅ Test cards created');
}

// Add click handlers to buttons
function setupButtons() {
  console.log('=== SETTING UP BUTTONS ===');
  const buttons = document.querySelectorAll('.category-btn');
  console.log('Found buttons:', buttons.length);
  
  buttons.forEach((btn, index) => {
    const category = btn.getAttribute('data-category');
    console.log(`Button ${index}: ${btn.textContent} -> ${category}`);
    
    // Remove existing listeners
    btn.removeEventListener('click', btn._clickHandler);
    
    // Create new handler
    btn._clickHandler = function(e) {
      e.preventDefault();
      console.log('🔥 Button clicked:', category);
      filterAndSort(category);
    };
    
    btn.addEventListener('click', btn._clickHandler);
  });
}

// Run diagnostic checks
setTimeout(function() {
  console.log('=== RUNNING DIAGNOSTICS ===');
  console.log('Resources available:', typeof resources !== 'undefined' ? resources?.length : 'undefined');
  console.log('Grid element:', !!document.getElementById('resourceGrid'));
  
  // Setup button handlers
  setupButtons();
  
  // If main script doesn't work, show test cards
  if (typeof resources === 'undefined') {
    console.log('⚠️ Main script not working, showing test cards...');
    filterAndSort(''); // This will trigger showTestCards automatically
  } else {
    console.log('✅ Main script available, showing all resources...');
    filterAndSort(''); // Show all resources initially
  }
}, 1000);
</script>

<script src="/scripts/resource-cards.js"></script>
