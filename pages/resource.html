<title>Resources</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .resource-controls {
    display: flex;
    justify-content: center;
    margin: 2rem 0 1.5rem 0;
  }
  .search-container {
    position: relative;
    width: 100%;
    max-width: 500px;
  }
  .search-container::before {
    content: "\f002";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--accent-color);
    z-index: 1;
    transition: color 0.3s ease;
  }
  .search-container:has(input:focus)::before {
    color: var(--accent-color);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .resource-controls input {
    width: 100%;
    font-size: 1.1rem;
    padding: 0.8rem 1rem 0.8rem 3rem;
    border-radius: 8px;
    border: 2px solid var(--border-color);
    background: var(--bg-secondary);
    color: white;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .resource-controls input:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
    transform: translateY(-1px);
  }
  .resource-controls input::placeholder {
    color: rgba(255,255,255,0.6);
  }
  
  /* Card animations */
  .resource-card {
    opacity: 0;
    transform: translateY(20px);
    animation: cardAppear 0.4s ease-out forwards;
  }
  .resource-card:nth-child(1) { animation-delay: 0.1s; }
  .resource-card:nth-child(2) { animation-delay: 0.15s; }
  .resource-card:nth-child(3) { animation-delay: 0.2s; }
  .resource-card:nth-child(4) { animation-delay: 0.25s; }
  .resource-card:nth-child(5) { animation-delay: 0.3s; }
  .resource-card:nth-child(6) { animation-delay: 0.35s; }
  .resource-card:nth-child(7) { animation-delay: 0.4s; }
  .resource-card:nth-child(8) { animation-delay: 0.45s; }
  .resource-card:nth-child(n+9) { animation-delay: 0.5s; }
  
  @keyframes cardAppear {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  
  .search-highlight {
    animation: highlightMatch 0.6s ease-out;
  }
  
  @keyframes highlightMatch {
    0% {
      transform: scale(1);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    50% {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(88,166,255,0.3);
    }
    100% {
      transform: scale(1);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
  }
  .resource-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.18em;
    margin-bottom: 0.1rem;
    margin-top: 1.5rem;
    justify-content: flex-start;
  }
  .resource-category {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border-radius: 4px;
    padding: 0.05em 0.45em 0.05em 0.45em;
    letter-spacing: 0.01em;
    text-transform: lowercase;
    opacity: 0.92;
    border: none;
    display: inline-block;
  }
  .resource-card h3 {
    color: var(--text-white);
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 0 0.2em 0;
    letter-spacing: 0.01em;
  }
  .resource-card p {
    color: var(--text-white);
    font-size: 1.01rem;
    margin: 0.5em 0 0 0;
    font-weight: 400;
    opacity: 0.9;
  }
  #resourceGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    justify-content: center;
    align-items: stretch;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }
  .resource-card {
    box-sizing: border-box;
    border-radius: 12px;
    border: 1.5px solid var(--border-color);
    background: var(--bg-secondary);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    padding: 1.1rem 1.2rem 1.2rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    min-height: 200px;
    transition: box-shadow 0.18s, border 0.18s;
  }
  .resource-card:hover {
    box-shadow: 0 6px 24px rgba(88,166,255,0.15);
    border: 1.5px solid var(--accent-color);
  }
  .resource-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: auto;
    padding-top: 0.8rem;
  }
  .resource-link {
    display: inline-block;
    font-weight: 600;
    color: var(--accent-color);
    background: none;
    border: 1px solid var(--accent-color);
    border-radius: 6px;
    padding: 0.4em 1em;
    text-decoration: none;
    font-size: 0.89rem;
    box-shadow: none;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .resource-link:hover, .resource-link:focus {
    text-decoration: none;
    color: var(--accent-color);
    border: 1px solid var(--accent-color);
  }
  @media (max-width: 900px) {
    #resourceGrid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
    }
    .search-container {
      max-width: 400px;
    }
  }
  @media (max-width: 600px) {
    #resourceGrid {
      grid-template-columns: 1fr;
      gap: 0.7rem;
    }
    .resource-card {
      min-width: 0;
      max-width: 100vw;
      margin: 0 auto;
      padding: 0.9rem 0.7rem 1rem 0.7rem;
    }
    .resource-controls {
      margin: 1rem 0;
      padding: 0 1rem;
    }
    .search-container {
      max-width: 100%;
    }
    .resource-controls input {
      font-size: 1rem;
      padding: 0.7rem 0.8rem 0.7rem 2.8rem;
    }
  }
</style>

<h1 class="resource-title">Resource Directory</h1>
<div class="resource-controls">
  <div class="search-container">
    <input id="resourceSearch" type="text" placeholder="Search resources by title, description, or category..." />
  </div>
</div>
<div id="resourceGrid"></div>
<script src="/scripts/resource-cards.js"></script>
