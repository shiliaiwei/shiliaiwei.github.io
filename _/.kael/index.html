<!DOCTYPE html>
<html lang="en">

<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Protected Access - KAEL</title>
       <style>
              * {
                     margin: 0;
                     padding: 0;
                     box-sizing: border-box;
              }

              body {
                     font-family: 'Courier New', monospace;
                     background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
                     color: #00ff41;
                     min-height: 100vh;
                     display: flex;
                     align-items: center;
                     justify-content: center;
                     overflow: hidden;
              }

              .container {
                     background: rgba(0, 0, 0, 0.8);
                     border: 2px solid #00ff41;
                     border-radius: 10px;
                     padding: 2rem;
                     max-width: 400px;
                     width: 100%;
                     text-align: center;
                     backdrop-filter: blur(10px);
                     box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
              }

              .logo {
                     font-size: 2rem;
                     font-weight: bold;
                     margin-bottom: 1rem;
                     text-shadow: 0 0 10px #00ff41;
              }

              .subtitle {
                     margin-bottom: 2rem;
                     opacity: 0.8;
                     font-size: 0.9rem;
              }

              .login-form {
                     display: flex;
                     flex-direction: column;
                     gap: 1rem;
              }

              .input-group {
                     text-align: left;
              }

              label {
                     display: block;
                     margin-bottom: 0.5rem;
                     font-size: 0.9rem;
              }

              input {
                     width: 100%;
                     padding: 0.8rem;
                     background: rgba(0, 0, 0, 0.7);
                     border: 1px solid #00ff41;
                     border-radius: 5px;
                     color: #00ff41;
                     font-family: inherit;
                     font-size: 1rem;
              }

              input:focus {
                     outline: none;
                     box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
              }

              .login-btn {
                     padding: 1rem;
                     background: transparent;
                     border: 2px solid #00ff41;
                     border-radius: 5px;
                     color: #00ff41;
                     cursor: pointer;
                     font-family: inherit;
                     font-size: 1rem;
                     font-weight: bold;
                     transition: all 0.3s ease;
                     margin-top: 1rem;
              }

              .login-btn:hover {
                     background: #00ff41;
                     color: #000;
                     box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
              }

              .error {
                     color: #ff0040;
                     font-size: 0.9rem;
                     margin-top: 1rem;
                     text-shadow: 0 0 5px #ff0040;
              }

              .protected-content {
                     display: none;
                     background: rgba(0, 0, 0, 0.9);
                     border: 2px solid #00ff41;
                     border-radius: 10px;
                     padding: 2rem;
                     max-width: 800px;
                     width: 100%;
                     max-height: 80vh;
                     overflow-y: auto;
              }

              .file-header {
                     display: flex;
                     justify-content: space-between;
                     align-items: center;
                     margin-bottom: 1rem;
                     padding-bottom: 1rem;
                     border-bottom: 1px solid #00ff41;
              }

              .file-name {
                     font-size: 1.2rem;
                     font-weight: bold;
              }

              .logout-btn {
                     padding: 0.5rem 1rem;
                     background: transparent;
                     border: 1px solid #ff0040;
                     border-radius: 3px;
                     color: #ff0040;
                     cursor: pointer;
                     font-family: inherit;
                     font-size: 0.8rem;
                     transition: all 0.3s ease;
              }

              .logout-btn:hover {
                     background: #ff0040;
                     color: #000;
              }

              .file-content {
                     white-space: pre-wrap;
                     font-family: 'Courier New', monospace;
                     font-size: 0.8rem;
                     line-height: 1.2;
                     background: rgba(0, 0, 0, 0.5);
                     padding: 1rem;
                     border-radius: 5px;
                     border: 1px solid #333;
              }

              /* Matrix-like background effect */
              .matrix {
                     position: fixed;
                     top: 0;
                     left: 0;
                     width: 100%;
                     height: 100%;
                     pointer-events: none;
                     z-index: -1;
              }

              .matrix-char {
                     position: absolute;
                     color: rgba(0, 255, 65, 0.1);
                     font-family: 'Courier New', monospace;
                     font-size: 1rem;
                     animation: fall linear infinite;
              }

              @keyframes fall {
                     from {
                            transform: translateY(-100px);
                            opacity: 1;
                     }

                     to {
                            transform: translateY(100vh);
                            opacity: 0;
                     }
              }
       </style>
</head>

<body>
       <div class="matrix" id="matrix"></div>

       <div class="container" id="loginContainer">
              <div class="logo">KAEL ACCESS</div>
              <div class="subtitle">Protected File System</div>

              <form class="login-form" onsubmit="login(event)">
                     <div class="input-group">
                            <label for="username">Username:</label>
                            <input type="text" id="username" required autocomplete="off">
                     </div>

                     <div class="input-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" required autocomplete="off">
                     </div>

                     <button type="submit" class="login-btn">ACCESS</button>
              </form>

              <div class="error" id="errorMsg"></div>
       </div>

       <div class="protected-content" id="protectedContent">
              <div class="file-header">
                     <div class="file-name">📄 eton.txt</div>
                     <button class="logout-btn" onclick="logout()">LOGOUT</button>
              </div>
              <div class="file-content" id="fileContent">Loading...</div>
       </div>

       <script>
              // Valid credentials
              const validCredentials = {
                     'eirsvi': 'srievi',
                     'admin': 'kael2025'
              };

              // Create matrix background effect
              function createMatrix() {
                     const matrix = document.getElementById('matrix');
                     const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZабвгдежзийклмнопрстуфхцчшщъыьэюя';

                     for (let i = 0; i < 50; i++) {
                            const char = document.createElement('div');
                            char.className = 'matrix-char';
                            char.textContent = chars[Math.floor(Math.random() * chars.length)];
                            char.style.left = Math.random() * 100 + '%';
                            char.style.animationDuration = (Math.random() * 3 + 2) + 's';
                            char.style.animationDelay = Math.random() * 2 + 's';
                            matrix.appendChild(char);
                     }
              }

              function login(event) {
                     event.preventDefault();

                     const username = document.getElementById('username').value;
                     const password = document.getElementById('password').value;
                     const errorMsg = document.getElementById('errorMsg');

                     if (validCredentials[username] && validCredentials[username] === password) {
                            // Successful login
                            document.getElementById('loginContainer').style.display = 'none';
                            document.getElementById('protectedContent').style.display = 'block';
                            loadFileContent();

                            // Store login session
                            sessionStorage.setItem('kaelAccess', 'granted');
                     } else {
                            // Failed login
                            errorMsg.textContent = 'Invalid credentials. Access denied.';
                            document.getElementById('username').value = '';
                            document.getElementById('password').value = '';
                     }
              }

              function logout() {
                     sessionStorage.removeItem('kaelAccess');
                     document.getElementById('loginContainer').style.display = 'block';
                     document.getElementById('protectedContent').style.display = 'none';
                     document.getElementById('username').value = '';
                     document.getElementById('password').value = '';
                     document.getElementById('errorMsg').textContent = '';
              }

              function loadFileContent() {
                     fetch('eton.txt')
                            .then(response => response.text())
                            .then(data => {
                                   document.getElementById('fileContent').textContent = data;
                            })
                            .catch(error => {
                                   document.getElementById('fileContent').textContent = 'Error loading file: ' + error.message;
                            });
              }

              // Check if user is already logged in
              window.onload = function () {
                     createMatrix();

                     if (sessionStorage.getItem('kaelAccess') === 'granted') {
                            document.getElementById('loginContainer').style.display = 'none';
                            document.getElementById('protectedContent').style.display = 'block';
                            loadFileContent();
                     }
              };

              // Prevent direct file access
              document.addEventListener('contextmenu', function (e) {
                     e.preventDefault();
              });

              document.addEventListener('keydown', function (e) {
                     if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                            e.preventDefault();
                     }
              });
       </script>
</body>

</html>
