<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test</title>
    <style>
        body { background: #0d1117; color: white; font-family: Arial; padding: 2rem; }
        .card { background: #161b22; margin: 1rem; padding: 1rem; border-radius: 8px; }
        #resourceGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <h1>Debug Test - Resource Cards</h1>
    <button onclick="testRender()">Test Render Cards</button>
    <button onclick="console.log('Resources:', resources.length)">Check Resources</button>
    
    <div id="resourceGrid"></div>
    
    <script src="/scripts/resource-cards.js"></script>
    
    <script>
        function testRender() {
            console.log('Manual test render...');
            if (typeof renderCards === 'function') {
                renderCards('');
            } else {
                console.log('renderCards function not available');
            }
        }
        
        // Test after script loads
        setTimeout(function() {
            console.log('=== MANUAL DEBUG TEST ===');
            console.log('renderCards available:', typeof renderCards);
            console.log('resources available:', typeof resources);
            console.log('resources length:', resources ? resources.length : 'undefined');
            
            const grid = document.getElementById('resourceGrid');
            console.log('Grid found:', !!grid);
            
            if (typeof renderCards === 'function') {
                console.log('Calling renderCards manually...');
                renderCards('');
            }
        }, 2000);
    </script>
</body>
</html>
